server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/zongce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: zongce
    password: zongce123!
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  thymeleaf:
    cache: false

app:
  upload-dir: uploads
  user:
    initial-password: 123456
  bootstrap:
    enabled: true
    create-sample-users: false
    admin-username: admin
    admin-name: 系统管理员
    admin-department: 信息化办公室
  jwt:
    secret: ${JWT_SECRET:ReplaceThisWithARealJwtSecretAtLeast32Chars}
    access-expire-minutes: 30
    refresh-expire-days: 7

logging:
  level:
    org.springframework.security: DEBUG
    com.zongce.system.service.impl.AppUserDetailsService: DEBUG
